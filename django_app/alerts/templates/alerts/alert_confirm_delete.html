{% extends "dashboard/base.html" %}

{% block title %}Delete Alert - HydroWatch{% endblock %}
{% block nav_alerts %}active{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-5 mx-auto animate-in">
        <div class="glass-card">
            <div class="card-header" style="border-bottom-color: rgba(244,63,94,0.2);">
                <i class="bi bi-exclamation-triangle" style="color: var(--hw-rose);"></i> Confirm Deletion
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this alert rule?</p>
                <p class="fw-semibold" style="color: var(--hw-text);">{{ rule }}</p>
                <div class="d-flex gap-2 mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn" style="background: rgba(244,63,94,0.15); color: var(--hw-rose); border: 1px solid rgba(244,63,94,0.3);">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </form>
                    <a href="{% url 'alerts:alert_list' %}" class="btn btn-glass">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
