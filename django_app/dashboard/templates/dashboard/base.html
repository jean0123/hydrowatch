<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HydroWatch{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --hw-bg: #0a0e1a;
            --hw-surface: #111827;
            --hw-surface-2: #1a2236;
            --hw-border: rgba(255,255,255,0.06);
            --hw-glass: rgba(255,255,255,0.03);
            --hw-glass-hover: rgba(255,255,255,0.06);
            --hw-blue: #3b82f6;
            --hw-cyan: #06b6d4;
            --hw-emerald: #10b981;
            --hw-purple: #8b5cf6;
            --hw-amber: #f59e0b;
            --hw-rose: #f43f5e;
            --hw-text: #f1f5f9;
            --hw-text-muted: #64748b;
            --hw-gradient-1: linear-gradient(135deg, #3b82f6, #06b6d4);
            --hw-gradient-2: linear-gradient(135deg, #8b5cf6, #ec4899);
            --hw-gradient-3: linear-gradient(135deg, #10b981, #06b6d4);
            --hw-gradient-4: linear-gradient(135deg, #f59e0b, #f43f5e);
            --hw-radius: 16px;
            --hw-radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--hw-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--hw-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 72px;
            background: var(--hw-surface);
            border-right: 1px solid var(--hw-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar:hover {
            width: 220px;
        }
        .sidebar-brand {
            width: 42px;
            height: 42px;
            background: var(--hw-gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 32px;
            flex-shrink: 0;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding: 0 12px;
            flex: 1;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: var(--hw-radius-sm);
            color: var(--hw-text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .sidebar-link i {
            font-size: 1.2rem;
            flex-shrink: 0;
            width: 22px;
            text-align: center;
        }
        .sidebar-link span {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .sidebar:hover .sidebar-link span {
            opacity: 1;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: var(--hw-glass-hover);
            color: var(--hw-text);
        }
        .sidebar-link.active {
            background: rgba(59,130,246,0.12);
            color: var(--hw-blue);
        }
        .sidebar-link.active i {
            color: var(--hw-blue);
        }

        /* ---- Main Content ---- */
        .main-content {
            margin-left: 72px;
            padding: 28px 32px;
            position: relative;
            z-index: 1;
        }

        /* ---- Glass Cards ---- */
        .glass-card {
            background: var(--hw-surface);
            border: 1px solid var(--hw-border);
            border-radius: var(--hw-radius);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .glass-card .card-header {
            background: transparent;
            border-bottom: 1px solid var(--hw-border);
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--hw-text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 0;
        }
        .glass-card .card-header i {
            font-size: 1rem;
        }
        .glass-card .card-body {
            padding: 20px;
        }

        /* ---- Stat Cards ---- */
        .stat-card {
            background: var(--hw-surface);
            border: 1px solid var(--hw-border);
            border-radius: var(--hw-radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.blue::before { background: var(--hw-gradient-1); }
        .stat-card.purple::before { background: var(--hw-gradient-2); }
        .stat-card.green::before { background: var(--hw-gradient-3); }
        .stat-card.amber::before { background: var(--hw-gradient-4); }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .stat-icon.blue { background: rgba(59,130,246,0.12); color: var(--hw-blue); }
        .stat-icon.purple { background: rgba(139,92,246,0.12); color: var(--hw-purple); }
        .stat-icon.green { background: rgba(16,185,129,0.12); color: var(--hw-emerald); }
        .stat-icon.amber { background: rgba(245,158,11,0.12); color: var(--hw-amber); }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
            background: linear-gradient(to right, var(--hw-text), var(--hw-text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--hw-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        /* ---- Map ---- */
        #map, #stationMap {
            height: 460px;
            border-radius: 0 0 var(--hw-radius) var(--hw-radius);
            /* no filter — standard OpenStreetMap tiles */
        }
        .leaflet-control-zoom a {
            background: var(--hw-surface) !important;
            color: var(--hw-text) !important;
            border-color: var(--hw-border) !important;
        }

        /* ---- Station List ---- */
        .station-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--hw-border);
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--hw-text);
        }
        .station-item:last-child { border-bottom: none; }
        .station-item:hover {
            background: var(--hw-glass-hover);
            color: var(--hw-text);
        }
        .station-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        .station-meta {
            font-size: 0.75rem;
            color: var(--hw-text-muted);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--hw-emerald);
            box-shadow: 0 0 8px rgba(16,185,129,0.4);
            flex-shrink: 0;
        }

        /* ---- Page Header ---- */
        .page-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .page-header p {
            color: var(--hw-text-muted);
            font-size: 0.9rem;
            margin: 4px 0 0;
        }

        /* ---- Buttons ---- */
        .btn-glow {
            background: var(--hw-gradient-1);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: var(--hw-radius-sm);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(59,130,246,0.25);
        }
        .btn-glow:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.35);
            color: white;
        }
        .btn-glass {
            background: var(--hw-glass-hover);
            border: 1px solid var(--hw-border);
            color: var(--hw-text);
            font-weight: 500;
            padding: 10px 20px;
            border-radius: var(--hw-radius-sm);
            transition: all 0.2s ease;
        }
        .btn-glass:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* ---- Forms ---- */
        .form-select, .form-control {
            background: var(--hw-surface-2);
            border: 1px solid var(--hw-border);
            color: var(--hw-text);
            border-radius: var(--hw-radius-sm);
            font-size: 0.85rem;
            padding: 8px 12px;
        }
        .form-select:focus, .form-control:focus {
            background: var(--hw-surface-2);
            border-color: var(--hw-blue);
            color: var(--hw-text);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-select option {
            background: var(--hw-surface);
        }

        /* ---- Tables ---- */
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--hw-text);
            --bs-table-border-color: var(--hw-border);
            font-size: 0.85rem;
        }
        .table thead th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--hw-text-muted);
            font-weight: 600;
            border-bottom-color: var(--hw-border);
            padding: 12px 16px;
        }
        .table td { padding: 12px 16px; }
        .table-hover tbody tr:hover {
            --bs-table-hover-bg: var(--hw-glass-hover);
        }

        /* ---- Badges ---- */
        .badge-active {
            background: rgba(16,185,129,0.12);
            color: var(--hw-emerald);
            font-weight: 600;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-inactive {
            background: rgba(244,63,94,0.12);
            color: var(--hw-rose);
        }

        /* ---- Alert Messages ---- */
        .alert {
            border-radius: var(--hw-radius-sm);
            border: 1px solid var(--hw-border);
            background: var(--hw-surface);
            font-size: 0.875rem;
        }
        .alert-success {
            border-color: rgba(16,185,129,0.3);
            background: rgba(16,185,129,0.08);
            color: var(--hw-emerald);
        }

        /* ---- Footer ---- */
        .footer {
            padding: 24px 0;
            text-align: center;
            font-size: 0.75rem;
            color: var(--hw-text-muted);
            border-top: 1px solid var(--hw-border);
            margin-top: 48px;
        }
        .footer a {
            color: var(--hw-blue);
            text-decoration: none;
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ---- Animations ---- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeUp 0.4s ease forwards;
        }
        .animate-in:nth-child(1) { animation-delay: 0.0s; }
        .animate-in:nth-child(2) { animation-delay: 0.05s; }
        .animate-in:nth-child(3) { animation-delay: 0.1s; }
        .animate-in:nth-child(4) { animation-delay: 0.15s; }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: 60px;
                flex-direction: row;
                bottom: 0;
                top: auto;
                padding: 0 12px;
                justify-content: space-around;
            }
            .sidebar:hover { width: 100%; }
            .sidebar-brand { display: none; }
            .sidebar-nav {
                flex-direction: row;
                gap: 0;
                padding: 0;
            }
            .sidebar-link {
                flex-direction: column;
                gap: 2px;
                padding: 8px 12px;
                font-size: 0.65rem;
            }
            .sidebar-link span { opacity: 1; }
            .main-content {
                margin-left: 0;
                margin-bottom: 60px;
                padding: 16px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="{% url 'dashboard:index' %}" class="sidebar-brand">H</a>
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard:index' %}" class="sidebar-link {% block nav_dashboard %}{% endblock %}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'alerts:alert_list' %}" class="sidebar-link {% block nav_alerts %}{% endblock %}">
                <i class="bi bi-bell-fill"></i>
                <span>Alerts</span>
            </a>
            <a href="{% url 'reports:report_list' %}" class="sidebar-link {% block nav_reports %}{% endblock %}">
                <i class="bi bi-file-earmark-bar-graph-fill"></i>
                <span>Reports</span>
            </a>
            <a href="/api/" target="_blank" class="sidebar-link">
                <i class="bi bi-braces"></i>
                <span>API</span>
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main-content">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

        <div class="footer">
            HydroWatch &mdash; Built with Django, FastAPI, Chart.js, Leaflet & Claude AI
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
