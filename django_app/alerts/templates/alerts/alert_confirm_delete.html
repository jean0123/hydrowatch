{% extends "dashboard/base.html" %}

{% block title %}Delete Alert - HydroWatch{% endblock %}
{% block nav_alerts %}active{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> Confirm Deletion
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this alert rule?</p>
                <p><strong>{{ rule }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                    <a href="{% url 'alerts:alert_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
