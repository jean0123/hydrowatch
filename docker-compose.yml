version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hydrowatch
      POSTGRES_USER: hydrowatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydrowatch"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn hydrowatch.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./django_app:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      - DATABASE_URL=postgis://hydrowatch:${POSTGRES_PASSWORD:-changeme}@db:5432/hydrowatch
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - INGESTION_SERVICE_URL=http://ingestion:8001
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-0}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    command: celery -A hydrowatch worker -l info
    volumes:
      - ./django_app:/app
    environment:
      - DATABASE_URL=postgis://hydrowatch:${POSTGRES_PASSWORD:-changeme}@db:5432/hydrowatch
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - INGESTION_SERVICE_URL=http://ingestion:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    command: celery -A hydrowatch beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./django_app:/app
    environment:
      - DATABASE_URL=postgis://hydrowatch:${POSTGRES_PASSWORD:-changeme}@db:5432/hydrowatch
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build:
      context: ./ingestion_service
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ingestion_service:/app
    environment:
      - DATABASE_URL=postgresql://hydrowatch:${POSTGRES_PASSWORD:-changeme}@db:5432/hydrowatch
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
    depends_on:
      - django
      - ingestion

volumes:
  pg_data:
  static_files:
  media_files:
